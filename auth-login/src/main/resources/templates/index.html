<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>颗粒认证中心</title>
    <style>
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f7fa; }
        .card { width: 100%; max-width: 420px; background: #fff; border-radius: 14px; padding: 36px 28px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); text-align: center; }
        h1 { margin: 0 0 10px; color: #1d2129; font-size: 24px; }
        p { margin: 0 0 24px; color: #86909c; font-size: 14px; }
        .btn { width: 100%; height: 44px; border: none; border-radius: 8px; background: #4080ff; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; transition: background .2s; }
        .btn:hover { background: #2f6de6; }
    </style>
</head>
<body>
<div class="card">
    <h1>认证中心主页</h1>
    <p>点击后发起授权，由授权服务判断登录态</p>
    <button id="goAuth" class="btn">发起授权登录</button>
</div>

<script>
    const OAUTH_CONFIG = {
        authorizationEndpoint: 'https://localhost:9000/oauth2/authorize',
        clientId: 'keli-test-client',
        redirectUri: 'https://localhost:8080/api/auth/callback',
        responseType: 'code',
        scope: 'openid client_server'
    };

    document.getElementById('goAuth').addEventListener('click', function () {
        const state = 'state-' + Math.random().toString(36).slice(2, 12);

        const authUrl = `${OAUTH_CONFIG.authorizationEndpoint}?` +
            `client_id=${encodeURIComponent(OAUTH_CONFIG.clientId)}&` +
            `redirect_uri=${encodeURIComponent(OAUTH_CONFIG.redirectUri)}&` +
            `response_type=${encodeURIComponent(OAUTH_CONFIG.responseType)}&` +
            `scope=${encodeURIComponent(OAUTH_CONFIG.scope)}&` +
            `state=${encodeURIComponent(state)}`;

        window.location.href = authUrl;
    });
</script>
</body>
</html>
